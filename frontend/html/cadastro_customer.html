<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Empresa - Sistema Contábil</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Sidebar Navigation -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-small">
                <svg width="32" height="32" viewBox="0 0 48 48" fill="none">
                    <rect width="48" height="48" rx="12" fill="#059669"/>
                    <path d="M24 12L32 20H28V36H20V20H16L24 12Z" fill="#FCD34D"/>
                </svg>
            </div>
            <span class="sidebar-title">Contador.I.A</span>
        </div>
        
        <nav class="sidebar-nav">
            <a href="./cadastro_customer.html" class="nav-item active">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M10 2.5v15m-7.5-7.5h15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Nova Empresa</span>
            </a>
            <a href="./lista_customer.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M2.5 5h15M2.5 10h15M2.5 15h15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Listar Empresas</span>
            </a>
            <a href="./envio_simples.html" class="nav-item">
                <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                    <path d="M3 5a2 2 0 012-2h10a2 2 0 012 2v10a2 2 0 01-2 2H5a2 2 0 01-2-2V5z" stroke="currentColor" stroke-width="2"/>
                    <path d="M3 7h14M7 11h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                </svg>
                <span>Envio do SIMPLES/INSS</span>
            </a>
        </nav>

        <div class="sidebar-footer">
            <button class="btn btn-outline btn-sm" onclick="logout()">
                <svg width="16" height="16" viewBox="0 0 20 20" fill="none">
                    <path d="M7.5 17.5H4.167A1.667 1.667 0 012.5 15.833V4.167A1.667 1.667 0 014.167 2.5H7.5M13.333 14.167L17.5 10m0 0l-4.167-4.167M17.5 10H7.5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Sair
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <div class="header-content">
                <h1>Cadastrar Nova Empresa</h1>
                <p class="subtitle">Preencha os dados do cliente abaixo</p>
            </div>
            <div class="user-info">
                <span id="user-name">Usuário</span>
                <div class="avatar">U</div>
            </div>
        </header>

        <div class="content-wrapper">
            <form id="customer-form" class="customer-form">
                <div class="form-section">
                    <h3>Informações da Empresa</h3>
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="company-name">Nome da Empresa *</label>
                            <input type="text" id="company-name" name="name" placeholder="Razão Social" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="company-cnpj">CNPJ *</label>
                            <input type="text" id="company-cnpj" name="cnpj" placeholder="00.000.000/0000-00" maxlength="18" required>
                        </div>
                        
                        <div class="form-group">
                            <label for="company-phone">Telefone</label>
                            <input type="tel" id="company-phone" name="phone" placeholder="(00) 00000-0000" maxlength="15">
                        </div>
                        
                        <div class="form-group">
                            <label for="company-email">E-mail *</label>
                            <input type="email" id="company-email" name="email" placeholder="contato@empresa.com" required>
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3>Documentos</h3>
                    
                    <div class="upload-area" id="upload-area">
                        <input type="file" id="file-upload" name="documents" accept=".pdf" multiple hidden>
                        <div class="upload-content">
                            <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
                                <path d="M24 8v24m-8-8l8-8 8 8M12 40h24" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                            <p class="upload-text">Arraste arquivos PDF aqui ou <span class="upload-link">clique para selecionar</span></p>
                            <p class="upload-hint">Máximo 10MB por arquivo</p>
                        </div>
                    </div>
                    
                    <div id="file-list" class="file-list"></div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="resetForm()">Limpar</button>
                    <button type="submit" class="btn btn-primary">
                        <span>Salvar Empresa</span>
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
                            <path d="M4.167 10h11.666m0 0L10 4.167M15.833 10L10 15.833" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </form>

            <div id="message-container" class="message-container"></div>
        </div>
    </main>

    <script src="../javascript/customer.js"></script>
</body>
</html>
